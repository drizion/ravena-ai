<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Comandos - RavenaBot</title>
    <link rel="stylesheet" href="/cmd.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.css">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="/android-chrome-192x192.png" alt="RavenaBot Logo">
                <h1>RavenaBot</h1>
            </div>
            <div class="header-title">
                Lista de Comandos
            </div>
        </header>

        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="command-search" class="search-input" placeholder="Buscar comando...">
        </div>

        <main id="command-list" class="main-content">
            <div id="no-results" class="info-text hidden" style="border-left-color: #ff4444; background-color: rgba(255, 68, 68, 0.1);">
                Nenhum comando encontrado para '<span id="search-term"></span>'
            </div>
            <div class="info-text">
                Comandos com um emoji podem ser ativados via reação (reagir na mensagem com o emoji).<br>
            </div>
       <!--      <div class="info-text hot">
                🔥 <b>Comandos novos:</b> !comida, !lol-build, !wr-build
            </div> -->
            <div id="loading" class="loading-container">
                <div class="loading-spinner"></div>
                <p>Carregando comandos...</p>
            </div>
        </main>

        <footer class="footer">
            <p>RavenaBot © 2026</p>
        </footer>

        <div id="toast" class="toast hidden">Comando copiado! Cole no zap</div>
    </div>

    <!-- Template for Tooltip -->
    <div id="tooltip" class="tooltip hidden"></div>

    <script src="/help.js?v=2"></script>
    <script src="/cmd.js?v=2"></script>
</body>
</html>
