<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajuda RavenaBot - Chat Assistant</title>
    
    <meta name="description" content="Tire suas dúvidas sobre a RavenaBot no chat de ajuda!">
    <meta name="author" content="moothz">
    
    <link rel="stylesheet" href="/cmd.css?v=2">
    <link rel="stylesheet" href="/ajuda.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.css">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="/android-chrome-192x192.png" alt="RavenaBot Logo">
                <h1>RavenaBot</h1>
            </div>
            <div class="header-title">
                Assistente de Ajuda
            </div>
        </header>

        <main class="main-content chat-main">
            <div id="chat-container" class="chat-container">
                <div class="message bot-message">
                    <div class="message-content">
                        Olá! Eu sou a assistente da RavenaBot. Como posso te ajudar hoje? Você pode perguntar sobre como configurar comandos, streams, ou qualquer outra funcionalidade!
                    </div>
                </div>
            </div>
        </main>

        <footer class="chat-footer">
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Digite sua dúvida aqui..." autocomplete="off">
                <button id="send-btn" title="Enviar">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <p class="copyright">RavenaBot © 2026</p>
        </footer>
    </div>

    <script src="/ajuda.js?v=1"></script>
</body>
</html>
